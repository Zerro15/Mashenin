services:
  web:
    image: node:20-alpine
    working_dir: /app
    command: >
      sh -c "npm install --prefix /app && HOST=0.0.0.0 PORT=3000 npm run dev"
    volumes:
      - ./apps/web:/app
      - /app/node_modules
    ports:
      - "3001:3000"
    environment:
      HOST: 0.0.0.0
      PORT: 3000
    depends_on:
      - api
    networks:
      - mashenin

  api:
    image: node:20-alpine
    working_dir: /app
    command: >
      sh -c "npm install --prefix /app && node src/server.js"
    volumes:
      - ./apps/api:/app
      - ./packages/shared:/packages/shared
      - /app/node_modules
    ports:
      - "4000:4000"
    environment:
      HOST: 0.0.0.0
      PORT: 4000
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_URL: redis://redis:6379
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET}
      LIVEKIT_WS_URL: ${LIVEKIT_WS_URL}
      DATA_MODE: file
    depends_on:
      - postgres
      - redis
    networks:
      - mashenin

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "55432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    networks:
      - mashenin

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "56379:6379"
    networks:
      - mashenin

networks:
  mashenin:
    driver: bridge

volumes:
  postgres-data:
